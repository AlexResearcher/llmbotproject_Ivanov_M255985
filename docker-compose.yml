services:
  auth_service:
    build:
      context: ./auth_service
    container_name: auth_service
    env_file:
      - ./auth_service/.env
    ports:
      - "8000:8000"
    volumes:
      - ./auth_service:/service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  bot_api:
    build:
      context: ./bot_service
    container_name: bot_api
    env_file:
      - ./bot_service/.env
    depends_on:
      - redis
      - rabbitmq
    ports:
      - "8001:8001"
    volumes:
      - ./bot_service:/service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001

  telegram_bot:
    build:
      context: ./bot_service
    container_name: telegram_bot
    env_file:
      - ./bot_service/.env
    depends_on:
      - redis
      - rabbitmq
    volumes:
      - ./bot_service:/service
    command: python run_bot.py

  bot_worker:
    build:
      context: ./bot_service
    container_name: bot_worker
    env_file:
      - ./bot_service/.env
    depends_on:
      - redis
      - rabbitmq
    volumes:
      - ./bot_service:/service
    command: celery -A app.infra.celery_app.celery_app worker --loglevel=info

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
